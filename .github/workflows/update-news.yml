name: Update News

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 JST 07:00 (UTC 22:00前日)
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch RSS and write news.json
        run: |
          pip install -q feedparser
          python3 << 'PYEOF'
          import feedparser, json, os
          from datetime import datetime, timezone

          # Google News RSS: クエリで事前フィルタ済み (pre_filtered=True)
          # 一般フィード: KEYWORDSでフィルタ (pre_filtered=False)
          SOURCES = [
              ('Google News ドル円', 'https://news.google.com/rss/search?q=ドル円+USD+JPY+FRB+Fed+日銀&hl=ja&gl=JP&ceid=JP:ja', True),
              ('Google News 金・原油', 'https://news.google.com/rss/search?q=金価格+ゴールド+XAU+原油+WTI+インフレ&hl=ja&gl=JP&ceid=JP:ja', True),
              ('みんかぶFX', 'https://fx.minkabu.jp/news/rss', True),
              ('NHK経済', 'https://www.nhk.or.jp/rss/news/cat4.xml', False),
          ]

          KEYWORDS = [
              'XAU', 'ゴールド', '金価格', '金相場',
              'ドル円', 'USD/JPY', 'FRB', 'Fed',
              '原油', 'WTI', 'VIX', '関税', 'インフレ',
              '銀', 'XAGUSD', '日銀', '為替',
          ]

          items = []
          seen = set()
          for source_name, url, pre_filtered in SOURCES:
              try:
                  feed = feedparser.parse(url)
                  entry_count = len(feed.entries)
                  print(f'{source_name}: {entry_count} entries at {url}')
                  if entry_count == 0:
                      print(f'  WARNING: no entries — feed may be unavailable')
                  for entry in feed.entries[:20]:
                      title   = entry.get('title',   '')
                      summary = entry.get('summary', '')
                      link    = entry.get('link',    '')
                      if not link or link in seen:
                          continue
                      text = title + ' ' + summary
                      if pre_filtered or any(kw in text for kw in KEYWORDS):
                          seen.add(link)
                          items.append({
                              'source':    source_name,
                              'title':     title,
                              'link':      link,
                              'published': entry.get('published', ''),
                          })
              except Exception as e:
                  print(f'SKIP {source_name}: {e}')

          items = items[:30]
          out = {
              'updated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'items':   items,
          }
          os.makedirs('public/data', exist_ok=True)
          with open('public/data/news.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print(f'Saved {len(items)} items, updated {out["updated"]}')
          PYEOF

      - name: Commit and push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update news.json $(date -u +%Y-%m-%d)"
          git push
